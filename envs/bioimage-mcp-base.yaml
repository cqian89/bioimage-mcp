name: bioimage-mcp-base
channels:
  - conda-forge
platforms:
  - linux-64
dependencies:
  - python=3.13
  - pip
  - bioio
  - bioio-ome-zarr
  - bioio-ome-tiff
  - numpy
  - openjdk
  - scipy
  - scikit-image
  - scyjava
  - phasorpy
  - numpydoc
  - pydantic>=2.0
  - pip:
    - bioio-bioformats
    # Install bioimage_mcp in editable mode for access to adapters
    - -e .
