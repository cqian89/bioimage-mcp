# tttrlib environment for bioimage-mcp
# Time-Tagged Time-Resolved data analysis (FCS, ICS, FLIM)
# NOTE: Uses Python 3.12 due to C++ binding compatibility
name: bioimage-mcp-tttrlib

channels:
  - tpeulen
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip
  - numpy>=1.20,<2.1
  - scipy
  - tifffile
  # Standard image I/O
  - bioio
  - bioio-ome-tiff
  - bioio-ome-zarr  # Required for OME-Zarr output in FLIM decay functions
  # TTTR analysis library (C++ with SWIG bindings)
  - tttrlib=0.25.0
  # For table output
  - pandas
