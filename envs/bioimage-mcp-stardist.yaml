# StarDist environment for bioimage-mcp
# Pin StarDist and CSBDeep versions for reproducibility
# Defaulting to tensorflow-cpu for cross-platform stability
name: bioimage-mcp-stardist

channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip
  - numpy
  - scipy
  - scikit-image
  - numba
  - stardist=0.9.2
  - csbdeep=0.8.2
  - tensorflow-cpu>=2.15
  # Standard image I/O
  - bioio
  - bioio-ome-tiff
  - bioio-ome-zarr
  # Utilities
  - pydantic>=2.0
  - pytest>=8.0
