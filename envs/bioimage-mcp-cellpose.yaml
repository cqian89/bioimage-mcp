# Cellpose environment for bioimage-mcp
# Pin cellpose version for reproducibility
# NOTE: Uses conda-forge cellpose package for cross-platform lockfile compatibility
# For GPU support, install pytorch-cuda separately after env creation
name: bioimage-mcp-cellpose

channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  - python=3.11
  - pip
  - numpy>=1.20,<2.1
  - scipy
  - tifffile
  # Standard image I/O
  - bioio
  - bioio-ome-tiff
  - bioio-ome-zarr
  # Use conda pytorch-cpu to avoid CUDA dependency resolution issues
  - pytorch>=2.0
  - cpuonly
  # Cellpose from conda-forge (better dependency resolution)
  - cellpose>=3.0,<4.0
