# Axis Tools Parameter Schemas

# JSON Schema definitions for axis manipulation tool parameters
# These schemas define the contract for tool inputs

$defs:
  AxisMapping:
    type: object
    additionalProperties:
      type: string
      pattern: "^[A-Z]$"
    description: "Mapping from old axis names to new names"
    example:
      Z: "T"
      T: "Z"

  AxisSpec:
    oneOf:
      - type: integer
        description: "Axis index (0-based, negative allowed)"
      - type: string
        pattern: "^[A-Z]$"
        description: "Axis name (single uppercase letter)"

schemas:
  # base.xarray.rename
  rename:
    type: object
    required: [mapping]
    properties:
      mapping:
        type: object
        additionalProperties:
          type: string
        description: "Mapping from old dimension names to new names."
    examples:
      - mapping: {"Z": "T", "T": "Z"}

  # base.xarray.squeeze
  squeeze:
    type: object
    properties:
      dim:
        type: string
        description: "Optional dimension name to squeeze."
    examples:
      - dim: "Z"
      - {} # Squeeze all singletons

  # base.xarray.expand_dims
  expand_dims:
    type: object
    required: [dim]
    properties:
      dim:
        type: string
        description: "Name for new dimension"
      axis:
        type: integer
        description: "Position to insert new dimension (0=first, -1=before last)"
    examples:
      - dim: "Z"
        axis: 0

  # base.xarray.transpose
  transpose:
    type: object
    required: [dims]
    properties:
      dims:
        type: array
        items:
          type: string
        description: "New order of dimensions"
    examples:
      - dims: ["T", "C", "Z", "Y", "X"]

# Input/Output contracts for all axis tools
io_contracts:
  common_input:
    - name: image
      artifact_type: BioImageRef
      required: true
      description: "Input image artifact"
  
  common_output:
    - name: output
      artifact_type: BioImageRef
      description: "Memory-backed transformed artifact"

# Error codes
error_codes:
  AXIS_NOT_FOUND:
    message_template: "Axis {axis} not found in image with axes {axes}"
    http_status: 400
  
  AXIS_DUPLICATE:
    message_template: "Cannot relabel {old} to {new}: axis {new} already exists"
    http_status: 400
  
  SQUEEZE_NON_SINGLETON:
    message_template: "Cannot squeeze axis {name} (index {idx}) with size {size} > 1"
    http_status: 400
  
  NO_SINGLETON_AXES:
    message_template: "No singleton axes to squeeze"
    http_status: 400
  
  AXIS_OUT_OF_BOUNDS:
    message_template: "Axis position {axis} out of bounds for {ndim}D array"
    http_status: 400
  
  INVALID_AXIS_NAME:
    message_template: "Invalid axis name '{name}': must be single uppercase letter"
    http_status: 400
