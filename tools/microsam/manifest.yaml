manifest_version: "1.0"
tool_id: tools.micro_sam
tool_version: "0.1.0"
name: MicroSAM
description: Interactive and automated segmentation for microscopy using Segment Anything Model (SAM)
tags: [segmentation, sam, bioimage]

env_id: bioimage-mcp-microsam
entrypoint: bioimage_mcp_microsam/entrypoint.py
python_version: "3.11"
platforms_supported:
  - linux-64
  - osx-arm64

dynamic_sources:
  - adapter: microsam
    prefix: micro_sam
    modules: []
    include_patterns: ["*"]
    exclude_patterns: []

functions:
  - id: meta.describe
    tool_id: tools.micro_sam
    name: Describe Function
    description: Return parameter schema for a function.
    tags: [meta]
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties:
        target_fn:
          type: string
          description: "The function id to describe"
      required:
        - target_fn
  - id: micro_sam.compute_embedding
    tool_id: tools.micro_sam
    name: Compute Embedding
    description: Precompute embeddings for an image to be reused in segmentation calls.
    inputs:
      - name: image
        artifact_type: BioImageRef
        description: Input image to compute embeddings for.
    outputs:
      - name: embedding
        artifact_type: ObjectRef
        description: Precomputed embedding or predictor object.
    params_schema:
      type: object
      properties:
        model:
          type: string
          default: "vit_b"
          description: SAM model type to use.
        normalize:
          type: boolean
          default: true
          description: Whether to normalize the image.
        channel:
          type: integer
          description: Channel index to use for multi-channel images.
        z_mode:
          type: string
          enum: ["2d", "slice"]
          default: "2d"
          description: How to handle 3D data.
        return_predictor:
          type: boolean
          default: false
          description: If true, returns a predictor object instead of raw embedding.
        force_fresh:
          type: boolean
          default: false
          description: If true, bypasses session cache and recomputes embeddings.
  - id: micro_sam.instance_segmentation.automatic_mask_generator
    tool_id: tools.micro_sam
    name: Automatic Mask Generator
    description: Automatically segment all objects in an image using SAM.
    inputs:
      - name: image
        artifact_type: BioImageRef
        description: Input image to segment.
      - name: predictor
        artifact_type: ObjectRef
        required: false
        description: Precomputed predictor or embedding.
    outputs:
      - name: output
        artifact_type: LabelImageRef
        description: Segmented label image.
    params_schema:
      type: object
      properties:
        model_type:
          type: string
          default: "vit_b"
          description: SAM model type to use (if predictor not provided).
        force_fresh:
          type: boolean
          default: false
          description: If true, bypasses session cache and recomputes embeddings.
  - id: micro_sam.cache.clear
    tool_id: tools.micro_sam
    name: Clear Cache
    description: Clear cached ObjectRefs in the worker.
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties: {}
