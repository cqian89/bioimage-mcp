manifest_version: "1.0"
tool_id: tools.micro_sam
tool_version: "0.1.0"
name: MicroSAM
description: Interactive and automated segmentation for microscopy using Segment Anything Model (SAM)

env_id: bioimage-mcp-microsam
entrypoint: bioimage_mcp_microsam/entrypoint.py
python_version: "3.11"
platforms_supported:
  - linux-64
  - osx-arm64

dynamic_sources:
  - adapter: microsam
    prefix: micro_sam
    modules: []
    include_patterns: ["*"]
    exclude_patterns: []

functions:
  - id: meta.describe
    tool_id: tools.micro_sam
    name: Describe Function
    description: Return parameter schema for a function.
    tags: [meta]
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties:
        target_fn:
          type: string
          description: "The function id to describe"
      required:
        - target_fn
