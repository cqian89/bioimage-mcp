manifest_version: "1.0"
tool_id: tools.base
tool_version: "0.2.0"
name: Base Image Processing Toolkit
description: Common image I/O, transforms, and pre-processing functions (primarily scikit-image).

env_id: bioimage-mcp-base
entrypoint: bioimage_mcp_base/entrypoint.py
python_version: "3.13"
platforms_supported:
  - linux-64
  - osx-arm64
  - win-64

dynamic_sources:
  - adapter: skimage
    prefix: skimage
    modules:
      - skimage.filters
      - skimage.morphology
      - skimage.transform
      - skimage.exposure
      - skimage.restoration
      - skimage.segmentation
      - skimage.measure
    include_patterns:
      - "*"
    exclude_patterns:
      - "_*"
      - "test_*"

  - adapter: phasorpy
    prefix: phasorpy
    modules:
      - phasorpy.phasor
      - phasorpy.lifetime
      - phasorpy.plot
      - phasorpy.filter
      - phasorpy.cursor
      - phasorpy.component
    include_patterns:
      - "*"
    exclude_patterns:
      - "_*"
      - "test_*"

  - adapter: scipy
    prefix: scipy
    modules:
      - scipy.ndimage
    include_patterns:
      - "*"
    exclude_patterns:
      - "_*"
      - "test_*"

functions:
  # xarray-based tools (Wrapper Consolidation)
  - fn_id: base.xarray.rename
    tool_id: tools.base
    name: Rename dimensions
    description: Rename dimension labels (e.g., Z -> T) while preserving metadata.
    tags: [image, axes, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
        description: Input image artifact
    outputs:
      - name: output
        artifact_type: BioImageRef
        description: Memory-backed transformed artifact
    params_schema:
      type: object
      required: [mapping]
      properties:
        mapping:
          type: object
          additionalProperties:
            type: string
          description: Mapping from old dimension names to new names.
      examples:
        - mapping: {"Z": "T", "T": "Z"}

  - fn_id: base.xarray.squeeze
    tool_id: tools.base
    name: Squeeze singleton dimensions
    description: Remove singleton dimensions.
    tags: [image, axes, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      properties:
        dim:
          type: string
          description: Optional dimension name to squeeze.
      examples:
        - dim: "Z"
        - {}

  - fn_id: base.xarray.expand_dims
    tool_id: tools.base
    name: Expand dimensions
    description: Add a new dimension.
    tags: [image, axes, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      required: [dim]
      properties:
        dim:
          type: string
          description: Name for new dimension
        axis:
          type: integer
          description: Position to insert new dimension (0=first, -1=before last)
      examples:
        - dim: "Z"
          axis: 0

  - fn_id: base.xarray.transpose
    tool_id: tools.base
    name: Transpose dimensions
    description: Reorder dimensions.
    tags: [image, axes, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      required: [dims]
      properties:
        dims:
          type: array
          items:
            type: string
          description: New order of dimensions
      examples:
        - dims: ["T", "C", "Z", "Y", "X"]

  - fn_id: base.xarray.isel
    tool_id: tools.base
    name: Index selection
    description: Select along dimensions by integer indexing/slices.
    tags: [image, transform, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      additionalProperties: true

  - fn_id: base.xarray.pad
    tool_id: tools.base
    name: Pad
    description: Pad along dimensions.
    tags: [image, transform, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      additionalProperties: true

  - fn_id: base.xarray.sum
    tool_id: tools.base
    name: Sum reduction
    description: Reduce along a named dimension using sum.
    tags: [image, reduction, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      required: [dim]
      properties:
        dim:
          type: string

  - fn_id: base.xarray.max
    tool_id: tools.base
    name: Max reduction
    description: Reduce along a named dimension using max.
    tags: [image, reduction, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      required: [dim]
      properties:
        dim:
          type: string

  - fn_id: base.xarray.mean
    tool_id: tools.base
    name: Mean reduction
    description: Reduce along a named dimension using mean.
    tags: [image, reduction, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      required: [dim]
      properties:
        dim:
          type: string

  - fn_id: base.io.bioimage.load
    tool_id: tools.base
    name: Load bioimage
    description: |
      Load an image file from the local filesystem into the artifact system as a BioImageRef.
      Validates path against filesystem.allowed_read configuration.
    tags: [image, io, load]
    input_mode: path
    inputs: []
    outputs:
      - name: image
        artifact_type: BioImageRef
        description: Loaded image artifact with metadata
    params_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to the image file
        format:
          type: string
          description: Optional format hint (e.g., "CZI", "LIF", "OME-TIFF")

  - fn_id: base.io.bioimage.inspect
    tool_id: tools.base
    name: Inspect bioimage metadata
    description: |
      Extract metadata (dimensions, pixel sizes, channel names) from an image without loading pixel data.
      Returns structured metadata for AI agent decision-making.
    tags: [image, io, metadata, inspect]
    input_mode: path
    inputs: []
    outputs: []
    params_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to the image file

  - fn_id: base.io.bioimage.slice
    tool_id: tools.base
    name: Slice multi-dimensional image
    description: |
      Extract a subset of a multi-dimensional image by specifying dimension indices or ranges.
      Preserves physical metadata (pixel sizes) in the output artifact.
    tags: [image, io, slice, transform]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
        description: Input image artifact to slice
    outputs:
      - name: output
        artifact_type: BioImageRef
        description: Sliced image artifact
    params_schema:
      type: object
      required: [slices]
      properties:
        slices:
          type: object
          description: |
            Map of dimension labels (T, C, Z, Y, X) to indices or ranges.
            Integer values select a single index. Objects with start/stop/step define ranges.
          additionalProperties:
            oneOf:
              - type: integer
              - type: object
                properties:
                  start:
                    type: integer
                  stop:
                    type: integer
                  step:
                    type: integer
      examples:
        - {"C": 0}
        - {"T": {"start": 0, "stop": 5}}
        - {"Z": 25, "C": 0}

  - fn_id: base.io.bioimage.validate
    tool_id: tools.base
    name: Validate bioimage file
    description: |
      Check if a file can be read as a bioimage and report any issues.
      Returns validation status, detected format, and list of problems.
    tags: [image, io, validate]
    input_mode: path
    inputs: []
    outputs: []
    params_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to the image file to validate

  - fn_id: base.io.bioimage.get_supported_formats
    tool_id: tools.base
    name: List supported image formats
    description: |
      Return a list of image file formats supported by the current environment.
      Queries installed bioio reader plugins.
    tags: [image, io, formats, discovery]
    input_mode: path
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties: {}

  - fn_id: base.io.bioimage.export
    tool_id: tools.base
    name: Export artifact to file
    description: |
      Export an image or table artifact to a specific file format.
      Supports OME-TIFF, OME-Zarr, PNG for images and CSV for tables.
      Replaces deprecated base.bioio.export function.
    tags: [image, io, export]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: false
        description: Image artifact to export
      - name: table
        artifact_type: TableRef
        required: false
        description: Table artifact to export
    outputs:
      - name: output
        artifact_type: BioImageRef
        description: Exported file artifact
    params_schema:
      type: object
      properties:
        format:
          type: string
          enum: [OME-TIFF, OME-Zarr, PNG, CSV, NPY]
          description: Target export format. If omitted, inferred from artifact type.
        path:
          type: string
          description: Optional output path. If omitted, generated in work_dir.

  # Required for on-demand schema enrichment
  - fn_id: meta.describe
    tool_id: tools.base
    name: Describe function
    description: Return a complete parameter schema for a target function.
    tags: [meta]
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties:
        target_fn:
          type: string
          description: The fn_id to describe.
      required: [target_fn]

function_overlays:
  base.skimage.filters.gaussian:
    description: "Apply a Gaussian filter to an image to reduce noise and detail."
    tags: ["denoise", "smooth", "filter"]
    hints:
      inputs:
        image:
          type: BioImageRef
          required: true
          description: "Input image to smooth"
          dimension_requirements:
            min_ndim: 2
            max_ndim: 3
            expected_axes: ["Y", "X"]
            squeeze_singleton: true
      success_hints:
        next_steps:
          - fn_id: "base.skimage.morphology.remove_small_objects"
            reason: "Denoising often precedes object detection or filtering."

  base.skimage.morphology.remove_small_objects:
    io_pattern: labels_to_labels
    tags: ["labels", "cleanup", "morphology"]
