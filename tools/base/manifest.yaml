manifest_version: "1.0"
tool_id: tools.base
tool_version: "0.2.0"
name: Base Image Processing Toolkit
description: Common image I/O, transforms, and pre-processing functions (primarily scikit-image).

env_id: bioimage-mcp-base
entrypoint: bioimage_mcp_base/entrypoint.py
python_version: "3.13"
platforms_supported:
  - linux-64
  - osx-arm64
  - win-64

dynamic_sources:
  - adapter: skimage
    prefix: skimage
    modules:
      - skimage.filters
      - skimage.morphology
      - skimage.transform
      - skimage.exposure
      - skimage.restoration
      - skimage.segmentation
      - skimage.measure
    include_patterns:
      - "*"
    exclude_patterns:
      - "_*"
      - "test_*"

  - adapter: phasorpy
    prefix: phasorpy
    modules:
      - phasorpy.phasor
      - phasorpy.lifetime
      - phasorpy.plot
      - phasorpy.filter
      - phasorpy.cursor
      - phasorpy.component
    include_patterns:
      - "*"
    exclude_patterns:
      - "_*"
      - "test_*"

  - adapter: scipy
    prefix: scipy
    modules:
      - scipy.ndimage
    include_patterns:
      - "*"
    exclude_patterns:
      - "_*"
      - "test_*"

  - adapter: xarray
    prefix: xarray
    modules: []
    include_patterns:
      - "*"
    exclude_patterns:
      - "_*"

  - adapter: pandas
    prefix: pandas
    modules: []
    include_patterns:
      - "*"
    exclude_patterns:
      - "_*"

functions:
  # xarray-based tools (Wrapper Consolidation)
  - fn_id: base.io.bioimage.load
    tool_id: tools.base
    name: Load bioimage
    description: |
      Load an image file from the local filesystem into the artifact system as a BioImageRef.
      Validates path against filesystem.allowed_read configuration.
    tags: [image, io, load]
    input_mode: path
    inputs: []
    outputs:
      - name: image
        artifact_type: BioImageRef
        description: Loaded image artifact with metadata
    params_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to the image file
        format:
          type: string
          description: Optional format hint (e.g., "CZI", "LIF", "OME-TIFF")

  - fn_id: base.io.bioimage.inspect
    tool_id: tools.base
    name: Inspect bioimage metadata
    description: |
      Extract metadata (dimensions, pixel sizes, channel names) from an image without loading pixel data.
      Returns structured metadata for AI agent decision-making.
    tags: [image, io, metadata, inspect]
    input_mode: path
    inputs: []
    outputs: []
    params_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to the image file

  - fn_id: base.io.bioimage.slice
    tool_id: tools.base
    name: Slice multi-dimensional image
    description: |
      Extract a subset of a multi-dimensional image by specifying dimension indices or ranges.
      Preserves physical metadata (pixel sizes) in the output artifact.
    tags: [image, io, slice, transform]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
        description: Input image artifact to slice
    outputs:
      - name: output
        artifact_type: BioImageRef
        description: Sliced image artifact
    params_schema:
      type: object
      required: [slices]
      properties:
        slices:
          type: object
          description: |
            Map of dimension labels (T, C, Z, Y, X) to indices or ranges.
            Integer values select a single index. Objects with start/stop/step define ranges.
          additionalProperties:
            oneOf:
              - type: integer
              - type: object
                properties:
                  start:
                    type: integer
                  stop:
                    type: integer
                  step:
                    type: integer
      examples:
        - {"C": 0}
        - {"T": {"start": 0, "stop": 5}}
        - {"Z": 25, "C": 0}

  - fn_id: base.io.bioimage.validate
    tool_id: tools.base
    name: Validate bioimage file
    description: |
      Check if a file can be read as a bioimage and report any issues.
      Returns validation status, detected format, and list of problems.
    tags: [image, io, validate]
    input_mode: path
    inputs: []
    outputs: []
    params_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to the image file to validate
        deep:
          type: boolean
          description: Perform deep validation (load pixels to check for corruption)
          default: false

  - fn_id: base.io.bioimage.get_supported_formats
    tool_id: tools.base
    name: List supported image formats
    description: |
      Return a list of image file formats supported by the current environment.
      Queries installed bioio reader plugins.
    tags: [image, io, formats, discovery]
    input_mode: path
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties: {}

  - fn_id: base.io.bioimage.export
    tool_id: tools.base
    name: Export artifact to file
    description: |
      Export an image artifact to a specific file format.
      Supports OME-TIFF, OME-Zarr, PNG, and NPY.
      Replaces deprecated base.bioio.export function.
    tags: [image, io, export]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: [BioImageRef, LabelImageRef, ObjectRef]
        required: true
        description: Image or label artifact to export
    outputs:
      - name: output
        artifact_type: [BioImageRef, LabelImageRef]
        description: Exported file artifact
    params_schema:
      type: object
      properties:
        format:
          type: string
          enum: [OME-TIFF, OME-Zarr, PNG, NPY]
          description: Target export format. If omitted, inferred from artifact type.
        path:
          type: string
          description: Optional output path. If omitted, generated in work_dir.

  - fn_id: base.io.table.load
    tool_id: tools.base
    name: Load tabular file
    description: |
      Load a CSV or TSV file into a TableRef artifact.
      Auto-detects delimiter if not specified.
      Validates path against filesystem.allowed_read.
    tags: [table, io, load]
    input_mode: path
    inputs: []
    outputs:
      - name: table
        artifact_type: TableRef
        description: Loaded table artifact with metadata
    params_schema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to the table file
        delimiter:
          type: string
          description: Column delimiter (auto-detect if omitted)
        format:
          type: string
          description: Optional format hint (e.g., "CSV", "TSV")
        encoding:
          type: string
          description: File encoding
          default: utf-8
        na_values:
          type: array
          items:
            type: string
          description: Additional values to treat as NA

  - fn_id: base.io.table.export
    tool_id: tools.base
    name: Export table to file
    description: |
      Export a TableRef or ObjectRef to a delimited file (CSV/TSV).
      Supports preservation of numeric precision (15 significant digits).
      Validates dest_path against filesystem.allowed_write.
    tags: [table, io, export]
    input_mode: path
    inputs:
      - name: data
        artifact_type: [TableRef, ObjectRef]
        required: true
        description: Table or memory object to export
    outputs:
      - name: table
        artifact_type: TableRef
        description: Exported table artifact
    params_schema:
      type: object
      required: [dest_path]
      properties:
        dest_path:
          type: string
          description: Absolute path to the destination file
        sep:
          type: string
          description: Column delimiter
          default: ","

  # Required for on-demand schema enrichment
  - fn_id: meta.describe
    tool_id: tools.base
    name: Describe function
    description: Return a complete parameter schema for a target function.
    tags: [meta]
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties:
        target_fn:
          type: string
          description: The fn_id to describe.
      required: [target_fn]

function_overlays:
  base.skimage.filters.gaussian:
    description: "Apply a Gaussian filter to an image to reduce noise and detail."
    tags: ["denoise", "smooth", "filter"]
    hints:
      inputs:
        image:
          type: BioImageRef
          required: true
          description: "Input image to smooth"
          dimension_requirements:
            min_ndim: 2
            max_ndim: 3
            expected_axes: ["Y", "X"]
            squeeze_singleton: true
      success_hints:
        next_steps:
          - fn_id: "base.skimage.morphology.remove_small_objects"
            reason: "Denoising often precedes object detection or filtering."

  base.skimage.morphology.remove_small_objects:
    io_pattern: labels_to_labels
    tags: ["labels", "cleanup", "morphology"]
