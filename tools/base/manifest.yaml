manifest_version: "1.0"
tool_id: tools.base
tool_version: "0.1.0"
name: Base Image Processing Toolkit
description: Common image I/O, transforms, and pre-processing functions (primarily scikit-image).

env_id: bioimage-mcp-base
entrypoint: bioimage_mcp_base/entrypoint.py
python_version: "3.13"
platforms_supported:
  - linux-64
  - osx-arm64
  - win-64

dynamic_sources:
  - adapter: skimage
    prefix: skimage
    modules:
      - skimage.filters
      - skimage.morphology
      - skimage.transform
      - skimage.exposure
      - skimage.restoration
      - skimage.segmentation
      - skimage.measure
    include_patterns:
      - "*"
    exclude_patterns:
      - "_*"
      - "test_*"

  - adapter: phasorpy
    prefix: phasorpy
    modules:
      - phasorpy.phasor
      - phasorpy.io
    include_patterns:
      - "*"
    exclude_patterns:
      - "_*"
      - "test_*"

  - adapter: scipy
    prefix: scipy
    modules:
      - scipy.ndimage
    include_patterns:
      - "*"
    exclude_patterns:
      - "_*"
      - "test_*"

functions:
  # xarray-based tools (Wrapper Consolidation)
  - fn_id: base.xarray.rename
    tool_id: tools.base
    name: Rename dimensions
    description: Rename dimension labels (e.g., Z -> T) while preserving metadata.
    tags: [image, axes, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
        description: Input image artifact
    outputs:
      - name: output
        artifact_type: BioImageRef
        description: Memory-backed transformed artifact
    params_schema:
      type: object
      required: [mapping]
      properties:
        mapping:
          type: object
          additionalProperties:
            type: string
          description: Mapping from old dimension names to new names.
      examples:
        - mapping: {"Z": "T", "T": "Z"}

  - fn_id: base.xarray.squeeze
    tool_id: tools.base
    name: Squeeze singleton dimensions
    description: Remove singleton dimensions.
    tags: [image, axes, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      properties:
        dim:
          type: string
          description: Optional dimension name to squeeze.
      examples:
        - dim: "Z"
        - {}

  - fn_id: base.xarray.expand_dims
    tool_id: tools.base
    name: Expand dimensions
    description: Add a new dimension.
    tags: [image, axes, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      required: [dim]
      properties:
        dim:
          type: string
          description: Name for new dimension
        axis:
          type: integer
          description: Position to insert new dimension (0=first, -1=before last)
      examples:
        - dim: "Z"
          axis: 0

  - fn_id: base.xarray.transpose
    tool_id: tools.base
    name: Transpose dimensions
    description: Reorder dimensions.
    tags: [image, axes, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      required: [dims]
      properties:
        dims:
          type: array
          items:
            type: string
          description: New order of dimensions
      examples:
        - dims: ["T", "C", "Z", "Y", "X"]

  - fn_id: base.xarray.isel
    tool_id: tools.base
    name: Index selection
    description: Select along dimensions by integer indexing/slices.
    tags: [image, transform, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      additionalProperties: true

  - fn_id: base.xarray.pad
    tool_id: tools.base
    name: Pad
    description: Pad along dimensions.
    tags: [image, transform, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      additionalProperties: true

  - fn_id: base.xarray.sum
    tool_id: tools.base
    name: Sum reduction
    description: Reduce along a named dimension using sum.
    tags: [image, reduction, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      required: [dim]
      properties:
        dim:
          type: string

  - fn_id: base.xarray.max
    tool_id: tools.base
    name: Max reduction
    description: Reduce along a named dimension using max.
    tags: [image, reduction, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      required: [dim]
      properties:
        dim:
          type: string

  - fn_id: base.xarray.mean
    tool_id: tools.base
    name: Mean reduction
    description: Reduce along a named dimension using mean.
    tags: [image, reduction, xarray]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: output
        artifact_type: BioImageRef
    params_schema:
      type: object
      required: [dim]
      properties:
        dim:
          type: string

  - fn_id: base.bioio.export
    tool_id: tools.base
    name: Export artifact to file
    description: Materialize a memory-backed artifact to a file-backed artifact (OME-TIFF).
    tags: [image, io, export]
    input_mode: xarray
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
        description: Input artifact to export (can be mem:// or file://)
    outputs:
      - name: output
        artifact_type: BioImageRef
        format: OME-TIFF
        description: File-backed OME-TIFF artifact
    params_schema:
      type: object
      properties:
        path:
          type: string
          description: Optional output path. If not provided, auto-generated in artifact store.
        format:
          type: string
          enum: [OME-TIFF, OME-Zarr]
          default: OME-TIFF
          description: Output format

  - fn_id: base.bioimage_mcp_base.transforms.phasor_from_flim
    tool_id: tools.base
    name: Phasor from FLIM
    description: Compute phasor coordinates from FLIM signal.
    tags: [phasor, flim]
    inputs:
      - name: dataset
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: g_image
        artifact_type: BioImageRef
      - name: s_image
        artifact_type: BioImageRef
      - name: intensity_image
        artifact_type: BioImageRef
    params_schema:
      type: object
      properties:
        time_axis:
          type: [string, integer]
        harmonic:
          type: integer
          default: 1

  - fn_id: base.bioimage_mcp_base.transforms.phasor_calibrate
    tool_id: tools.base
    name: Phasor Calibrate
    description: Calibrate phasor coordinates.
    tags: [phasor, calibration]
    inputs:
      - name: sample_phasors
        artifact_type: BioImageRef
        required: true
      - name: reference_phasors
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: calibrated_phasors
        artifact_type: BioImageRef
    params_schema:
      type: object
      required: [lifetime, frequency]
      properties:
        lifetime:
          type: number
        frequency:
          type: number
        harmonic:
          type: integer
          default: 1

  # Required for on-demand schema enrichment
  - fn_id: meta.describe
    tool_id: tools.base
    name: Describe function
    description: Return a complete parameter schema for a target function.
    tags: [meta]
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties:
        target_fn:
          type: string
          description: The fn_id to describe.
      required: [target_fn]

function_overlays:
  base.skimage.filters.gaussian:
    description: "Apply a Gaussian filter to an image to reduce noise and detail."
    tags: ["denoise", "smooth", "filter"]
    hints:
      success_hints:
        next_steps:
          - fn_id: "base.skimage.morphology.remove_small_objects"
            reason: "Denoising often precedes object detection or filtering."

  base.skimage.morphology.remove_small_objects:
    io_pattern: labels_to_labels
    tags: ["labels", "cleanup", "morphology"]
