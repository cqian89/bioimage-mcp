manifest_version: "0.1"
tool_id: tools.cellpose
tool_version: "0.1.0"
name: Cellpose Segmentation
description: Cell and nucleus segmentation using Cellpose deep learning models

env_id: bioimage-mcp-cellpose
entrypoint: bioimage_mcp_cellpose/entrypoint.py
python_version: "3.10"
platforms_supported:
  - linux-64
  - osx-arm64
  - win-64

functions:
  - fn_id: cellpose.segment
    tool_id: tools.cellpose
    name: Cellpose Segment
    description: Segment cells or nuclei using Cellpose deep learning models.
    tags: [segmentation, deep-learning, cells, nuclei]
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: labels
        artifact_type: LabelImageRef
        format: OME-TIFF
        required: true
      - name: cellpose_bundle
        artifact_type: NativeOutputRef
        format: cellpose-seg-npy
        required: false
    # params_schema is minimal; full schema comes from meta.describe
    params_schema:
      type: object
      properties: {}
    resource_hints:
      gpu_recommended: true
      memory_mb: 4096

  - fn_id: meta.describe
    tool_id: tools.cellpose
    name: Describe Function
    description: Return parameter schema for a function.
    tags: [meta]
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties:
        target_fn:
          type: string
          description: "The fn_id to describe"
      required:
        - target_fn
