manifest_version: "1.0"
tool_id: tools.cellpose
tool_version: "0.1.0"
name: Cellpose Segmentation
description: Cell and nucleus segmentation using Cellpose deep learning models

env_id: bioimage-mcp-cellpose
entrypoint: bioimage_mcp_cellpose/entrypoint.py
python_version: "3.11"
platforms_supported:
  - linux-64
  - osx-arm64
  - win-64

# Dynamic discovery configuration
dynamic_sources:
  - adapter: cellpose
    prefix: cellpose
    modules:
      - cellpose.models
      - cellpose.train
    include_patterns:
      - "eval"
      - "train_seg"
      - "segment"
    exclude_patterns:
      - "_*"
      - "test_*"

functions:
  # New evaluation function (primary for modern API)
  - fn_id: cellpose.eval
    tool_id: tools.cellpose
    name: Cellpose Eval
    description: Core evaluation function for Cellpose models.
    tags: [segmentation, deep-learning]
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: labels
        artifact_type: LabelImageRef
        format: OME-TIFF
        required: true
    params_schema:
      type: object
      properties: {}
    hints:
      inputs:
        image:
          type: BioImageRef
          required: true
          description: "Input image for segmentation"
          dimension_requirements:
            min_ndim: 2
            max_ndim: 3
            expected_axes: ["Y", "X"]
            squeeze_singleton: true
    resource_hints:
      gpu_recommended: true
      memory_mb: 4096

  # Training function (dynamically discovered)
  - fn_id: cellpose.train_seg
    tool_id: tools.cellpose
    name: Cellpose Training
    description: Train or fine-tune Cellpose models.
    tags: [training, deep-learning]
    inputs:
      - name: image
        artifact_type: BioImageRef
        required: true
      - name: mask
        artifact_type: LabelImageRef
        required: true
    outputs:
      - name: weights
        artifact_type: NativeOutputRef
        format: cellpose-model
        required: true
      - name: losses
        artifact_type: TableRef
        format: csv
        required: true
    params_schema:
      type: object
      properties: {}

  - fn_id: cellpose.CellposeModel
    tool_id: tools.cellpose
    name: Initialize Cellpose Model
    description: Instantiate a CellposeModel and return an ObjectRef for reuse.
    tags: [initialization, deep-learning]
    inputs: []
    outputs:
      - name: model
        artifact_type: ObjectRef
        required: true
    params_schema:
      type: object
      properties:
        model_type:
          type: string
          default: "cyto3"
        gpu:
          type: boolean
          default: false

  - fn_id: cellpose.CellposeModel.eval
    tool_id: tools.cellpose
    name: Evaluate Cellpose Model
    description: Run evaluation on a pre-initialized CellposeModel.
    tags: [segmentation, deep-learning]
    inputs:
      - name: model
        artifact_type: ObjectRef
        required: true
      - name: x
        artifact_type: BioImageRef
        required: true
    outputs:
      - name: labels
        artifact_type: LabelImageRef
        format: OME-TIFF
        required: true
    params_schema:
      type: object
      properties: {}

  - fn_id: cellpose.cache.clear
    tool_id: tools.cellpose
    name: Clear Model Cache
    description: Clear all cached ObjectRefs from memory
    tags: [cache, memory]
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties: {}

  - fn_id: meta.describe
    tool_id: tools.cellpose
    name: Describe Function
    description: Return parameter schema for a function.
    tags: [meta]
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties:
        target_fn:
          type: string
          description: "The fn_id to describe"
      required:
        - target_fn
