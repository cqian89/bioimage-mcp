manifest_version: "1.0"
tool_id: tools.cellpose
tool_version: "0.1.0"
name: Cellpose Segmentation
description: Cell and nucleus segmentation using Cellpose deep learning models

env_id: bioimage-mcp-cellpose
entrypoint: bioimage_mcp_cellpose/entrypoint.py
python_version: "3.11"
platforms_supported:
  - linux-64
  - osx-arm64
  - win-64

# Dynamic discovery configuration
dynamic_sources:
  - adapter: cellpose
    prefix: cellpose
    modules:
      - cellpose.models
      - cellpose.train
    include_patterns:
      - "eval"
      - "train_seg"
      - "segment"
    exclude_patterns:
      - "_*"
      - "test_*"

functions:
  # Training function (dynamically discovered)
  - fn_id: cellpose.train.train_seg
    tool_id: tools.cellpose
    name: Cellpose Training
    description: Train or fine-tune Cellpose models.
    tags: [training, deep-learning]
    inputs:
      - name: net
        artifact_type: ObjectRef
        required: false
        description: Pre-initialized model to train (optional, will create new if not provided)
      - name: image
        artifact_type: BioImageRef
        required: true
        supported_storage_types: ["file", "zarr-temp"]
      - name: mask
        artifact_type: LabelImageRef
        required: true
        supported_storage_types: ["file", "zarr-temp"]
    outputs:
      - name: weights
        artifact_type: NativeOutputRef
        format: cellpose-model
        required: true
      - name: losses
        artifact_type: TableRef
        format: csv
        required: true
    params_schema:
      type: object
      properties:
        n_epochs:
          type: integer
          default: 100
          description: "Number of training epochs"
        learning_rate:
          type: number
          default: 0.1
          description: "Learning rate for training"
        batch_size:
          type: integer
          default: 8
          description: "Batch size for training"
        weight_decay:
          type: number
          default: 0.00001
          description: "L2 regularization weight"
        save_path:
          type: string
          description: "Directory to save trained model weights"
        model_name:
          type: string
          description: "Name for the trained model file"
        save_every:
          type: integer
          default: 100
          description: "Save checkpoint every N epochs"
        normalize:
          type: boolean
          default: true
          description: "Normalize image intensities"

  - fn_id: cellpose.models.CellposeModel
    tool_id: tools.cellpose
    name: Initialize Cellpose Model
    description: Instantiate a CellposeModel and return an ObjectRef for reuse.
    tags: [initialization, deep-learning]
    inputs: []
    outputs:
      - name: model
        artifact_type: ObjectRef
        required: true
    params_schema:
      type: object
      properties:
        model_type:
          type: string
          default: "cyto3"
        gpu:
          type: boolean
          default: false

  - fn_id: cellpose.models.CellposeModel.eval
    tool_id: tools.cellpose
    name: Evaluate Cellpose Model
    description: Run evaluation on a pre-initialized CellposeModel.
    tags: [segmentation, deep-learning]
    inputs:
      - name: model
        artifact_type: ObjectRef
        required: false
      - name: x
        artifact_type: BioImageRef
        required: true
        supported_storage_types: ["file", "zarr-temp"]
    outputs:
      - name: labels
        artifact_type: LabelImageRef
        format: OME-Zarr
        required: true
    params_schema:
      type: object
      properties:
        model_type:
          type: string
          default: "cyto3"
          description: "Model type to initialize when no model ObjectRef is provided."
        diameter:
          type: number
          default: 30.0
          description: "Estimated cell diameter in pixels. Use 0 for automatic diameter estimation. Critical for accurate segmentation."
        flow_threshold:
          type: number
          default: 0.4
          description: "Flow error threshold for mask reconstruction (0.0-1.0). Lower values = stricter, fewer masks."
        cellprob_threshold:
          type: number
          default: 0.0
          description: "Cell probability threshold (-6.0 to 6.0). Lower values = larger cells. Higher values = smaller, more confident detections."
        do_3D:
          type: boolean
          default: false
          description: "Run 3D segmentation. Input must have Z dimension."
        channels:
          type: array
          items:
            type: integer
          default: [0, 0]
          description: "Channels to use for segmentation. [cytoplasm, nucleus] with 0=grayscale."
        min_size:
          type: integer
          default: 15
          description: "Minimum mask size in pixels. Masks smaller than this are removed."
        normalize:
          type: boolean
          default: true
          description: "Normalize image intensities. Set to False if image is already normalized."
        tile:
          type: boolean
          default: false
          description: "Tile large images for processing."
        augment:
          type: boolean
          default: false
          description: "Use test-time augmentation. May improve results at 4x processing time cost."

  - fn_id: cellpose.denoise.DenoiseModel
    tool_id: tools.cellpose
    name: Initialize Denoise Model
    description: Instantiate a DenoiseModel and return an ObjectRef for reuse.
    tags: [initialization, deep-learning, denoise]
    inputs: []
    outputs:
      - name: model
        artifact_type: ObjectRef
        required: true
    params_schema:
      type: object
      properties:
        model_type:
          type: string
          default: "denoise_cyto3"
        gpu:
          type: boolean
          default: false

  - fn_id: cellpose.denoise.DenoiseModel.eval
    tool_id: tools.cellpose
    name: Denoise Image
    description: Run denoising on an image using a pre-initialized DenoiseModel.
    tags: [denoise, deep-learning]
    inputs:
      - name: model
        artifact_type: ObjectRef
        required: true
      - name: x
        artifact_type: BioImageRef
        required: true
        supported_storage_types: ["file", "zarr-temp"]
    outputs:
      - name: denoised
        artifact_type: BioImageRef
        format: OME-Zarr
        required: true
    params_schema:
      type: object
      properties:
        diameter:
          type: number
          default: 30.0
          description: "Estimated cell diameter in pixels. Use 0 for automatic estimation."
        channels:
          type: array
          items:
            type: integer
          default: [0, 0]
          description: "Channels to use. [cytoplasm, nucleus] with 0=grayscale."
        normalize:
          type: boolean
          default: true
          description: "Normalize image intensities."
        tile:
          type: boolean
          default: false
          description: "Tile large images for processing."

  - fn_id: cellpose.metrics.average_precision
    tool_id: tools.cellpose
    name: Average Precision
    description: Compute average precision between predicted and ground truth masks at multiple IoU thresholds.
    tags: [metrics, evaluation]
    inputs:
      - name: masks_pred
        artifact_type: LabelImageRef
        required: true
        supported_storage_types: ["file", "zarr-temp"]
      - name: masks_true
        artifact_type: LabelImageRef
        required: true
        supported_storage_types: ["file", "zarr-temp"]
    outputs:
      - name: results
        artifact_type: TableRef
        format: json
        required: true
    params_schema:
      type: object
      properties:
        threshold:
          type: array
          items:
            type: number
          default: [0.5, 0.75, 0.9]
          description: IoU thresholds for computing AP

  - fn_id: cellpose.cache.clear
    tool_id: tools.cellpose
    name: Clear Model Cache
    description: Clear all cached ObjectRefs from memory
    tags: [cache, memory]
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties: {}

  - fn_id: meta.describe
    tool_id: tools.cellpose
    name: Describe Function
    description: Return parameter schema for a function.
    tags: [meta]
    inputs: []
    outputs: []
    params_schema:
      type: object
      properties:
        target_fn:
          type: string
          description: "The fn_id to describe"
      required:
        - target_fn
