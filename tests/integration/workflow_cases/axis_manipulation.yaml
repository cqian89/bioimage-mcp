- test_name: "flim_phasor_golden_path"
  description: "End-to-end FLIM phasor workflow with axis swapping"
  steps:
    - step_id: "fix_axes"
      fn_id: "base.xarray.transpose"
      inputs:
        image: "datasets/FLUTE_FLIM_data_tif/Embryo.tif"
      params:
        dims: ["Z", "C", "T", "Y", "X"]
      assertions:
        - type: "output_type"
          value: "BioImageRef"
    - step_id: "compute_phasor"
      fn_id: "base.phasorpy.phasor.phasor_from_signal"
      inputs:
        signal: "{fix_axes.output}"
      params:
        harmonic: 1
      assertions:
        - type: "artifact_exists"
        - type: "output_type"
          value: "BioImageRef"

- test_name: "squeeze_expand_roundtrip"
  description: "Verify expand_dims then squeeze restores axes"
  steps:
    - step_id: "add_dim"
      fn_id: "base.xarray.expand_dims"
      inputs:
        image: "datasets/synthetic/test.tif"
      params:
        axis: 0
        dim: "Z"
      assertions:
        - type: "metadata_check"
          key: "axes"
          value: "TCZYX"
    - step_id: "remove_dim"
      fn_id: "base.xarray.squeeze"
      inputs:
        image: "{add_dim.output}"
      params:
        dim: "Z"
      assertions:
        - type: "metadata_check"
          key: "axes"
          value: "TCZYX"

- test_name: "axis_swap_test"
  description: "Verify transpose exchanges Z and Y axes"
  steps:
    - step_id: "swap_axes"
      fn_id: "base.xarray.transpose"
      inputs:
        image: "datasets/synthetic/test.tif"
      params:
        dims: ["Y", "Z", "X"]
      assertions:
        - type: "output_type"
          value: "BioImageRef"
