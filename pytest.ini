[pytest]
addopts = -q
pythonpath =
  src
markers =
  pipeline_validation: marks tests as pipeline validation (deselect with '-m "not pipeline_validation"')
  slow: marks tests as slow (deselect with '-m "not slow"')
  integration: marks tests as integration tests
  mock_execution: marks tests that use mocked execution
  real_execution: marks tests that run real execution paths
  timeout: marks tests with a timeout constraint
