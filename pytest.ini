[pytest]
addopts = -q
pythonpath =
  src
  tools/base
  tools/cellpose
  tools/tttrlib
  tools/trackpy
markers =
  pipeline_validation: marks tests as pipeline validation (deselect with '-m "not pipeline_validation"')
  slow: marks tests as slow (deselect with '-m "not slow"')
  integration: marks tests as integration tests
  mock_execution: marks tests that use mocked execution
  real_execution: marks tests that run real execution paths
  timeout: marks tests with a timeout constraint
  requires_cellpose: marks tests that require the bioimage-mcp-cellpose conda environment
  requires_base: marks tests that require the bioimage-mcp-base conda environment
  requires_env: marks tests that require a specific conda environment (parameterized)
  smoke_minimal: marks tests as minimal smoke tests for CI (fast, base env only)
  smoke_full: marks tests as full smoke tests (may require optional tool environments)
  uses_minimal_data: marks tests that use synthetic/minimal data
  requires_lfs_dataset: marks tests that need LFS-tracked datasets
  constitution: marks tests that verify constitution compliance
