name: CI PR

"on":
  pull_request: {}
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Define LFS bundle
        run: |-
          echo "LFS_INCLUDE<<EOF" >> "$GITHUB_ENV"
          echo "datasets/sample_czi/Plate1-Blue-A-02-Scene-1-P2-E1-01.czi" >> "$GITHUB_ENV"
          echo "datasets/FLUTE_FLIM_data_tif/Embryo.tif" >> "$GITHUB_ENV"
          echo "datasets/FLUTE_FLIM_data_tif/Fluorescein_Embryo.tif" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Restore LFS bundle cache
        id: lfs-cache
        uses: actions/cache@v4
        with:
          path: |-
            datasets/sample_czi/Plate1-Blue-A-02-Scene-1-P2-E1-01.czi
            datasets/FLUTE_FLIM_data_tif/Embryo.tif
            datasets/FLUTE_FLIM_data_tif/Fluorescein_Embryo.tif
          key: ${{ runner.os }}-lfs-core-${{ hashFiles('datasets/sample_czi/Plate1-Blue-A-02-Scene-1-P2-E1-01.czi', 'datasets/FLUTE_FLIM_data_tif/Embryo.tif', 'datasets/FLUTE_FLIM_data_tif/Fluorescein_Embryo.tif', '.gitattributes') }}
          restore-keys: |-
            ${{ runner.os }}-lfs-core-
            ${{ runner.os }}-

      - name: Fetch LFS datasets on cache miss
        if: steps.lfs-cache.outputs.cache-hit != 'true'
        run: git lfs pull --include="${LFS_INCLUDE//$'\n'/,}" --exclude=""

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install core dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit -q

      - name: Run contract tests
        run: pytest tests/contract -q

  smoke-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Define LFS bundle
        run: |-
          echo "LFS_INCLUDE<<EOF" >> "$GITHUB_ENV"
          echo "datasets/synthetic/test.tif" >> "$GITHUB_ENV"
          echo "datasets/FLUTE_FLIM_data_tif/hMSC control.tif" >> "$GITHUB_ENV"
          echo "datasets/trackpy-examples/bulk_water/frame000_green.ome.tiff" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Restore LFS bundle cache
        id: lfs-cache
        uses: actions/cache@v4
        with:
          path: |-
            datasets/synthetic/test.tif
            datasets/FLUTE_FLIM_data_tif/hMSC control.tif
            datasets/trackpy-examples/bulk_water/frame000_green.ome.tiff
          key: ${{ runner.os }}-lfs-pr-smoke-${{ hashFiles('datasets/synthetic/test.tif', 'datasets/FLUTE_FLIM_data_tif/hMSC control.tif', 'datasets/trackpy-examples/bulk_water/frame000_green.ome.tiff', '.gitattributes') }}
          restore-keys: |-
            ${{ runner.os }}-lfs-pr-smoke-
            ${{ runner.os }}-

      - name: Fetch LFS datasets on cache miss
        if: steps.lfs-cache.outputs.cache-hit != 'true'
        run: git lfs pull --include="${LFS_INCLUDE//$'\n'/,}" --exclude=""

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          init-shell: bash
          cache-environment: false

      - name: Install core dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Write local CI config
        run: bioimage-mcp configure

      - name: Prepare local CI config
        run: python scripts/ci/prepare_ci_config.py

      - name: Install PR smoke environments
        run: |-
          bioimage-mcp install --profile cpu
          bioimage-mcp install trackpy

      - name: Capture doctor output
        run: |-
          mkdir -p .tmp/ci
          bioimage-mcp doctor --json > .tmp/ci/doctor-pr.json || true

      - name: Run PR smoke tests
        run: pytest tests/smoke --smoke-pr -q --smoke-record

      - name: Upload smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-pr-diagnostics
          path: |
            .bioimage-mcp/smoke_logs/
            .tmp/ci/
          if-no-files-found: warn
