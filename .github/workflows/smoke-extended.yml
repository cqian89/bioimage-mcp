name: Smoke Extended

"on":
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  smoke-extended:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Define LFS bundle
        run: |-
          echo "LFS_INCLUDE<<EOF" >> "$GITHUB_ENV"
          echo "datasets/synthetic/test.tif" >> "$GITHUB_ENV"
          echo "datasets/FLUTE_FLIM_data_tif/hMSC control.tif" >> "$GITHUB_ENV"
          echo "datasets/trackpy-examples/bulk_water/frame000_green.ome.tiff" >> "$GITHUB_ENV"
          echo "datasets/tttr-data/bh/bh_spc132.spc" >> "$GITHUB_ENV"
          echo "datasets/tttr-data/imaging/leica/sp5/LSM_1.ptu" >> "$GITHUB_ENV"
          echo "datasets/tttr-data/hdf/1a_1b_Mix.hdf5" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Restore LFS bundle cache
        id: lfs-cache
        uses: actions/cache@v4
        with:
          path: |-
            datasets/synthetic/test.tif
            datasets/FLUTE_FLIM_data_tif/hMSC control.tif
            datasets/trackpy-examples/bulk_water/frame000_green.ome.tiff
            datasets/tttr-data/bh/bh_spc132.spc
            datasets/tttr-data/imaging/leica/sp5/LSM_1.ptu
            datasets/tttr-data/hdf/1a_1b_Mix.hdf5
          key: ${{ runner.os }}-lfs-extended-${{ hashFiles('datasets/synthetic/test.tif', 'datasets/FLUTE_FLIM_data_tif/hMSC control.tif', 'datasets/trackpy-examples/bulk_water/frame000_green.ome.tiff', 'datasets/tttr-data/bh/bh_spc132.spc', 'datasets/tttr-data/imaging/leica/sp5/LSM_1.ptu', 'datasets/tttr-data/hdf/1a_1b_Mix.hdf5', '.gitattributes') }}
          restore-keys: |-
            ${{ runner.os }}-lfs-extended-
            ${{ runner.os }}-

      - name: Fetch LFS datasets on cache miss
        if: steps.lfs-cache.outputs.cache-hit != 'true'
        run: git lfs pull --include="${LFS_INCLUDE//$'\n'/,}" --exclude=""

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          init-shell: bash
          cache-environment: false

      - name: Install core dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Write local CI config
        run: bioimage-mcp configure

      - name: Prepare local CI config
        run: python scripts/ci/prepare_ci_config.py

      - name: Install extended smoke environments
        run: |-
          bioimage-mcp install --profile cpu
          bioimage-mcp install trackpy stardist tttrlib microsam

      - name: Capture doctor output
        run: |-
          mkdir -p .tmp/ci
          bioimage-mcp doctor --json > .tmp/ci/doctor-extended.json || true

      - name: Run extended smoke tests
        run: pytest tests/smoke --smoke-extended -q --smoke-record

      - name: Upload smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-extended-diagnostics
          path: |
            .bioimage-mcp/smoke_logs/
            .tmp/ci/
          if-no-files-found: warn
